services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      GROQ_API_KEY: ${GROQ_API_KEY}
      APP_PASSWORD: ${APP_PASSWORD:-}
      CORS_ORIGINS: http://localhost:3000
    ports:
      - "8000:8000"

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        VITE_API_BASE_URL: http://localhost:8000/api
    depends_on:
      - backend
    ports:
      - "3000:80"
