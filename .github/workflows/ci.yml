name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Compile source
        run: |
          python -m py_compile app.py data_intelligence/*.py

      - name: Run tests
        run: |
          python -m pytest

      - name: Run smoke test
        run: |
          python scripts/smoke_test.py
